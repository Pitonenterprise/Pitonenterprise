name: Keep Supabase Alive

# Pings the site's DB-backed health endpoint daily so the free Supabase
# project never pauses (it sleeps after ~7 days of inactivity).

on:
  schedule:
    # 03:30 UTC = 09:00 IST (every morning). GitHub may delay scheduled runs
    # by a few minutes under load — fine for a daily keep-alive.
    - cron: '30 3 * * *'
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint (touches the database)
        run: |
          curl -fsSL --retry 3 --retry-delay 15 \
            "https://www.pitonenterprise.com/api/health" \
            && echo "Supabase pinged — project stays active."
